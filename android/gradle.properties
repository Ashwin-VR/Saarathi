org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true

# Workaround for intermittent D8 "nest mates unavailable" errors on Windows:
# prefer full classpath for dexing transform resolution.
android.useFullClasspathForDexingTransform=true

# ── R8 full mode: more aggressive dead-code elimination than default R8 ──────
# Safe with Flutter — Flutter's embedding already ships with keep rules.
android.enableR8.fullMode=true
