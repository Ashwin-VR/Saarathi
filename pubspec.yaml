name: accident_app
description: Offline-first emergency response app with BLE SOS, OSM maps, crash detection, and nearby emergency services.
publish_to: "none"
version: 2.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Maps (flutter_map with OSM tiles — no API key required)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Location / GPS (crash detection + position stream)
  geolocator: ^11.0.0
  permission_handler: ^11.3.0

  # BLE (central/scan side only — advertising is done natively)
  flutter_ble_peripheral: ^1.2.5
  flutter_blue_plus: ^1.31.15

  # HTTP / Overpass API
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Local database (POI cache)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.22
  path_provider: ^2.1.3
  path: ^1.9.0

  # SMS fallback
  telephony: ^0.2.0

  # Sensors (accelerometer for crash / G-force detection)
  sensors_plus: ^4.0.2

  # Notifications
  flutter_local_notifications: ^17.1.2

  # Utilities
  uuid: ^4.3.3
  shared_preferences: ^2.2.3
  intl: ^0.19.0

  # TTS (voice feedback for follow mode)
  flutter_tts: ^4.2.0

  # UI
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1
  audioplayers: ^6.6.0
  volume_controller: ^3.4.4
  url_launcher: ^6.3.2
  pdf: ^3.12.0
  http: ^1.6.0
  share_plus: ^10.0.2
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
