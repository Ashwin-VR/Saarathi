name: accident_app
description: RoadSoS — Zero-friction emergency resource finder for road accident scenes.
publish_to: "none"
version: 2.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Maps (flutter_map with OSM tiles — no API key required)
  flutter_map: ^6.1.0
  flutter_map_tile_caching: ^9.0.1
  latlong2: ^0.9.0

  # Location / GPS
  geolocator: ^11.0.0
  permission_handler: ^11.3.0

  # BLE (scan/receive only — no peripheral advertising)
  flutter_blue_plus: ^1.31.15

  # HTTP / Overpass API
  dio: ^5.4.3
  connectivity_plus: ^6.0.3
  http: ^1.6.0

  # Local database (POI cache)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.22
  path_provider: ^2.1.3
  path: ^1.9.0

  # Sensors (accelerometer for crash / G-force detection)
  sensors_plus: ^4.0.2

  # Notifications
  flutter_local_notifications: ^17.1.2

  # Intents (dial, SMS, share, maps)
  url_launcher: ^6.3.2
  share_plus: ^10.0.2

  # QR code
  qr_flutter: ^4.1.0

  # PDF generation
  pdf: ^3.12.0

  # AI
  google_generative_ai: ^0.4.3

  # Local asset decompression
  archive: ^3.4.10

  # Persistent storage
  shared_preferences: ^2.2.3

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  cupertino_icons: ^1.0.6

  # Crash alarm audio
  audioplayers: ^6.6.0

  # UI helpers
  cached_network_image: ^3.3.1
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/tiles/
    - assets/icons/
    - assets/audio/
